name: Pull Request
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  TZ: UTC
  USER: root
  # Sized to finish in a single wave on the self-hosted runner pool (observed
  # ceiling ~125 concurrent jobs, minus a few slots for the other test jobs).
  # A count above pool capacity forces a second wave that pays pod spin-up,
  # checkout, and nix substitution overhead again.
  INTEGRATION_SHARD_COUNT: "100"
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  Lint:
    runs-on: smallworld-arc
    permissions:
      contents: write
    outputs:
      changes_detected: ${{ steps.ac.outputs.changes_detected }}

    steps:
      - uses: cachix/cachix-action@v17
        with:
          name: smallworld
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Prefer the bot token so the auto-commit step below can push lint
          # fixups, but fall back to the default workflow token so the job
          # still checks out and builds when BOT_TOKEN is unset (previously the
          # checkout was skipped entirely, leaving every later nix step to run
          # against an empty workspace).
          token: ${{ secrets.BOT_TOKEN || github.token }}

      - name: Cache inputs
        env:
          cachix_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
        if: ${{ env.cachix_token != '' }}
        run: |
          # Archive every flake input (recursively) and push the resulting
          # store paths to Cachix so downstream jobs and contributors get cache
          # hits. This replaces the `.#printInputsRecursive` flake output that
          # was removed in the macOS-support refactor (#367) with a
          # self-contained equivalent.
          nix flake archive --json \
            | nix run nixpkgs#jq -- -r '[.. | objects | .path? // empty] | unique | .[]' \
            | cachix push smallworld

      - name: Format
        env:
          bot_token: ${{ secrets.BOT_TOKEN }}
        if: ${{ env.bot_token != '' }}
        run: |
          nix develop .#lint -c isort . --profile black
          nix develop .#lint -c black ./
          nix develop .#lint -c treefmt -f nixfmt --no-cache

      - id: ac
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        env: 
          bot_token: ${{ secrets.BOT_TOKEN }}
        if: ${{ env.bot_token != '' }}
        with:
          commit_message: "style: isort and black"
          commit_author: GitHub Actions <actions@github.com>

      - name: Changes Detected
        if: steps.ac.outputs.changes_detected == 'true'
        run: |
            echo "Linters caused a commit.  Terminating run; tests will continue on next commit"
            exit 1        

      - name: Lint
        run: |
          nix develop .#lint -c isort --check --profile black .
          nix develop .#lint -c black --check ./
          nix develop .#lint -c flake8 ./
          nix develop .#lint -c mypy --explicit-package-bases --ignore-missing-imports ./
          nix develop .#lint -c treefmt -f nixfmt --ci

  # Builds the devshell and test artifacts once and pushes them to Cachix (via
  # the cachix-action post hook) so every test job substitutes the PR-specific
  # store paths instead of rebuilding them. Test jobs gate on this job rather
  # than Lint, which keeps linting off the critical path; if the formatter
  # auto-commits, the new push cancels this run through the concurrency group.
  Build:
    runs-on: smallworld-arc
    steps:
      - uses: cachix/cachix-action@v17
        with:
          name: smallworld
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - uses: actions/checkout@v6
      - name: Build Devshell
        run: |
          nix -L develop -c true
      - name: Build Test Artifacts
        run: |
          nix build ./ci#tests ./ci#rtos_demo

  Unit-Test:
    runs-on: smallworld-arc
    needs: Build
    env:
      SMALLWORLD_COVERAGE: "1"
      SMALLWORLD_COVERAGE_RCFILE: ${{ github.workspace }}/.coveragerc
      COVERAGE_RCFILE: ${{ github.workspace }}/.coveragerc
      COVERAGE_FILE: ${{ github.workspace }}/coverage-data/.coverage.unit
    steps:
      - uses: cachix/cachix-action@v17
        with:
          name: smallworld
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - uses: actions/checkout@v6
      - name: Run Unit Tests
        run: |
          mkdir -p "$GITHUB_WORKSPACE/coverage-data"
          nix build ./ci#tests
          tar -C tests -xvf result/test_binaries.tar
          cd tests
          nix develop .. -c python3 -m coverage run --parallel-mode unit.py -v
      - name: Upload Coverage Data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: coverage-data
          include-hidden-files: true
          if-no-files-found: ignore

  Python39:
    runs-on: ubuntu-latest
    env:
      SMALLWORLD_COVERAGE: "1"
      SMALLWORLD_COVERAGE_RCFILE: ${{ github.workspace }}/.coveragerc
      COVERAGE_RCFILE: ${{ github.workspace }}/.coveragerc
      COVERAGE_FILE: ${{ github.workspace }}/coverage-data/.coverage.python39
    container:
      # GitHub's Ubuntu 24.04 Python toolcache does not provide the exact
      # 3.9.6 patch release. Use the official Python 3.9.6 container so this
      # job always exercises the minimum supported interpreter version.
      image: python:3.9.6
    steps:
      - uses: actions/checkout@v6
      - name: Install SmallWorld On Python 3.9.6
        run: |
          mkdir -p "$GITHUB_WORKSPACE/coverage-data"
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install coverage '.[emu-unicorn]'
      - name: Run Python 3.9.6 Compatibility Smoke Test
        run: python -m coverage run --parallel-mode tests/python39/python39_compat.py
      - name: Upload Coverage Data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-python39
          path: coverage-data
          include-hidden-files: true
          if-no-files-found: ignore

  Example-Test:
    runs-on: smallworld-arc
    needs: Build
    env:
      SMALLWORLD_COVERAGE: "1"
      SMALLWORLD_COVERAGE_RCFILE: ${{ github.workspace }}/.coveragerc
      COVERAGE_RCFILE: ${{ github.workspace }}/.coveragerc
      COVERAGE_FILE: ${{ github.workspace }}/coverage-data/.coverage.example
    steps:
      - uses: cachix/cachix-action@v17
        with:
          name: smallworld
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - uses: actions/checkout@v6
      - name: Run Example
        run: |
          mkdir -p "$GITHUB_WORKSPACE/coverage-data"
          cd examples
          sed -i 's/github:smallworld-re\/smallworld/../' nix-harness.py
          nix develop .. -c python3 -m coverage run --parallel-mode nix-harness.py 100
      - name: Upload Coverage Data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-example
          path: coverage-data
          include-hidden-files: true
          if-no-files-found: ignore
  
  Downstream-Flake:
    runs-on: smallworld-arc
    needs: Build
    env:
      SMALLWORLD_COVERAGE: "1"
      SMALLWORLD_COVERAGE_RCFILE: ${{ github.workspace }}/.coveragerc
      COVERAGE_RCFILE: ${{ github.workspace }}/.coveragerc
      COVERAGE_FILE: ${{ github.workspace }}/coverage-data/.coverage.downstream
    steps:
      - uses: cachix/cachix-action@v17
        with:
          name: smallworld
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - uses: actions/checkout@v6
      - name: Test Flake
        run: |
          mkdir -p "$GITHUB_WORKSPACE/coverage-data"
          cd tests/downstream_flake
          nix flake update
          nix run .
      - name: Upload Coverage Data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-downstream
          path: coverage-data
          include-hidden-files: true
          if-no-files-found: ignore

  Integration-Matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        env:
          SHARD_COUNT: ${{ env.INTEGRATION_SHARD_COUNT }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          count = int(os.environ["SHARD_COUNT"])
          print(f"matrix={json.dumps({'shard': list(range(count))})}")
          PY
          
  Integration-Test:
    runs-on: smallworld-arc
    needs: [Build, Integration-Matrix]
    env:
      SMALLWORLD_COVERAGE: "1"
      SMALLWORLD_COVERAGE_RCFILE: ${{ github.workspace }}/.coveragerc
      COVERAGE_RCFILE: ${{ github.workspace }}/.coveragerc
      COVERAGE_FILE: ${{ github.workspace }}/coverage-data/.coverage.integration-${{ matrix.shard }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.Integration-Matrix.outputs.matrix) }}
    steps:
      - uses: cachix/cachix-action@v17
        with:
          name: smallworld
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - uses: actions/checkout@v6
      - name: Build Artifacts
        run: |
          nix build ./ci#tests
          tar -C tests -xvf result/test_binaries.tar
          nix build ./ci#rtos_demo
          cp result/zephyr.elf use_cases/rtos_demo/zephyr.elf
      - name: Run Integration Tests
        run: |
          mkdir -p "$GITHUB_WORKSPACE/coverage-data"
          cd tests
          # Timings ride along in the coverage artifact; Coverage-Combine
          # merges them into case-timings.json, which is committed back to
          # tests/case_timings.json periodically to keep shards balanced.
          nix develop .. -c python3 -m coverage run --parallel-mode integration.py -v \
            --shard-index ${{ matrix.shard }} --shard-count ${{ env.INTEGRATION_SHARD_COUNT }} \
            --record-timings "$GITHUB_WORKSPACE/coverage-data/case-timings-shard-${{ matrix.shard }}.json"
      - name: Upload Coverage Data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration-${{ matrix.shard }}
          path: coverage-data
          include-hidden-files: true
          if-no-files-found: ignore

  Coverage-Combine:
    runs-on: ubuntu-latest
    needs: [Unit-Test, Example-Test, Integration-Test, Downstream-Flake, Python39]
    if: always()
    env:
      COVERAGE_RCFILE: ${{ github.workspace }}/.coveragerc
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Coverage
        run: python -m pip install coverage
      - name: Download Coverage Data
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: true
      - name: Merge Case Timings
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib

          merged = {}
          for path in sorted(
              pathlib.Path("coverage-artifacts").glob("case-timings-shard-*.json")
          ):
              merged.update(json.loads(path.read_text()))
          pathlib.Path("case-timings.json").write_text(
              json.dumps(merged, indent=2, sort_keys=True) + "\n"
          )
          print(f"merged timings for {len(merged)} cases")

          if merged:
              slowest = sorted(merged.items(), key=lambda kv: -kv[1])[:15]
              lines = [
                  "## Slowest Integration Cases",
                  "",
                  "Refresh shard balance by copying `case-timings.json` from the",
                  "`coverage-combined` artifact to `tests/case_timings.json`.",
                  "",
                  "| Case | Duration |",
                  "| --- | ---: |",
              ]
              lines += [f"| `{cid}` | {dur:.1f}s |" for cid, dur in slowest]
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as handle:
                  handle.write("\n".join(lines) + "\n")
          PY
      - name: Combine Coverage
        run: |
          mkdir -p coverage-artifacts
          if [ -z "$(find coverage-artifacts -name '.coverage*' -print -quit)" ]; then
            echo "No coverage data was uploaded" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          python -m coverage combine coverage-artifacts
          python -m coverage report | tee coverage-report.txt
          python -m coverage json -o coverage.json
          python -m coverage xml -o coverage.xml
          python -m coverage html -d htmlcov
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          coverage_json = json.loads(Path("coverage.json").read_text())
          totals = coverage_json["totals"]

          def as_float(value: object) -> float:
              try:
                  return float(value)
              except (TypeError, ValueError):
                  return 0.0

          files = []
          for file_path, file_data in coverage_json.get("files", {}).items():
              summary = file_data.get("summary", {})
              files.append(
                  {
                      "path": file_path,
                      "percent": as_float(summary.get("percent_covered")),
                      "display": summary.get(
                          "percent_covered_display",
                          f"{as_float(summary.get('percent_covered')):.1f}",
                      ),
                      "missing": int(summary.get("missing_lines", 0)),
                      "statements": int(summary.get("num_statements", 0)),
                  }
              )

          files = [entry for entry in files if entry["statements"] > 0]
          lowest_coverage = sorted(
              files,
              key=lambda entry: (entry["percent"], -entry["missing"], entry["path"]),
          )[:10]

          report_text = Path("coverage-report.txt").read_text().rstrip()
          coverage_pct = totals.get(
              "percent_covered_display",
              f"{as_float(totals.get('percent_covered')):.1f}",
          )

          lines = [
              "## Coverage Summary",
              "",
              "| Metric | Value |",
              "| --- | ---: |",
              f"| Line coverage | {coverage_pct}% |",
              f"| Files | {len(files)} |",
              f"| Statements | {int(totals.get('num_statements', 0))} |",
              f"| Covered lines | {int(totals.get('covered_lines', 0))} |",
              f"| Missing lines | {int(totals.get('missing_lines', 0))} |",
          ]

          if int(totals.get("num_branches", 0)):
              lines.extend(
                  [
                      f"| Branches | {int(totals.get('num_branches', 0))} |",
                      f"| Covered branches | {int(totals.get('covered_branches', 0))} |",
                      f"| Missing branches | {int(totals.get('missing_branches', 0))} |",
                      f"| Partial branches | {int(totals.get('num_partial_branches', 0))} |",
                  ]
              )

          lines.extend(
              [
                  "",
                  "### Lowest-Coverage Files",
                  "",
                  "| File | Coverage | Missing Lines |",
                  "| --- | ---: | ---: |",
              ]
          )

          if lowest_coverage:
              for entry in lowest_coverage:
                  lines.append(
                      f"| `{entry['path']}` | {entry['display']}% | {entry['missing']} |"
                  )
          else:
              lines.append("| No measured files | n/a | n/a |")

          lines.extend(
              [
                  "",
                  "<details>",
                  "<summary>Full coverage report</summary>",
                  "",
                  "```text",
                  report_text,
                  "```",
                  "</details>",
              ]
          )

          with summary_path.open("a") as handle:
              handle.write("\n".join(lines) + "\n")
          PY
      - name: Upload Combined Coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-combined
          path: |
            .coverage
            coverage-report.txt
            coverage.json
            coverage.xml
            case-timings.json
            htmlcov
          include-hidden-files: true
          if-no-files-found: ignore
          
  Results:
    # ubuntu-latest so this pass/fail check does not wait on (or occupy) a
    # self-hosted runner slot.
    runs-on: ubuntu-latest
    needs: [Lint, Build, Unit-Test, Example-Test, Integration-Matrix, Integration-Test, Downstream-Flake, Python39, Coverage-Combine]
    if: always()
    steps:
      - name: Formatter committed – new run will verify
        if: needs.Lint.outputs.changes_detected == 'true'
        run: exit 1

      - name: All tests OK
        if: needs.Lint.outputs.changes_detected != 'true' && !contains(needs.*.result, 'failure')
        run: exit 0

      - name: Tests Failed
        if: needs.Lint.outputs.changes_detected != 'true' && contains(needs.*.result, 'failure')
        run: exit 1
      
