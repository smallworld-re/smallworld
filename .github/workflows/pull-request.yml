name: Pull Request
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

env:
  TZ: UTC
  USER: root
  INTEGRATION_SHARD_COUNT: "16"
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  Lint:
    runs-on: smallworld-arc
    permissions:
      contents: write
    outputs:
      changes_detected: ${{ steps.ac.outputs.changes_detected }}

    steps:
      - uses: cachix/cachix-action@v17
        with:
          name: smallworld
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          
      - name: Checkout
        uses: actions/checkout@v6
        env:
          bot_token: ${{ secrets.BOT_TOKEN }}
        if: ${{ env.bot_token != '' }}
        with:
          token: ${{ secrets.BOT_TOKEN }}

      - name: Cache inputs
        env:
          cachix_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
        if: ${{ env.cachix_token != '' }}
        run: |
          nix run .#printInputsRecursive | cachix push smallworld

      - name: Build devshell
        run: |
          nix -L develop -c true

      - name: Format
        env:
          bot_token: ${{ secrets.BOT_TOKEN }}
        if: ${{ env.bot_token != '' }}
        run: |
          nix develop -c isort . --profile black
          nix develop -c black ./
          nix develop -c treefmt -f nixfmt --no-cache

      - id: ac
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        env: 
          bot_token: ${{ secrets.BOT_TOKEN }}
        if: ${{ env.bot_token != '' }}
        with:
          commit_message: "style: isort and black"
          commit_author: GitHub Actions <actions@github.com>

      - name: Changes Detected
        if: steps.ac.outputs.changes_detected == 'true'
        run: |
            echo "Linters caused a commit.  Terminating run; tests will continue on next commit"
            exit 1        

      - name: Lint
        run: |
          nix develop -c isort --check --profile black .
          nix develop -c black --check ./
          nix develop -c flake8 ./
          nix develop -c mypy --explicit-package-bases --ignore-missing-imports ./
          nix develop -c treefmt -f nixfmt --ci

      - name: Check Title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: nix develop -c bash .github/workflows/scripts/conventional.sh "$TITLE"

      - name: Build Test Artifacts
        run: |
          nix build ./ci#tests
          nix build ./ci#rtos_demo

  Unit-Test:
    runs-on: smallworld-arc
    needs: Lint
    steps:
      - uses: cachix/cachix-action@v17
        with:
          name: smallworld
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - uses: actions/checkout@v6
      - name: Run Unit Tests
        run: |
          cd tests
          nix develop .. -c python3 unit.py -v

  Python39:
    runs-on: ubuntu-latest
    needs: Lint
    container:
      # GitHub's Ubuntu 24.04 Python toolcache does not provide the exact
      # 3.9.6 patch release. Use the official Python 3.9.6 container so this
      # job always exercises the minimum supported interpreter version.
      image: python:3.9.6
    steps:
      - uses: actions/checkout@v6
      - name: Install SmallWorld On Python 3.9.6
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install '.[emu-unicorn]'
      - name: Run Python 3.9.6 Compatibility Smoke Test
        run: python tests/python39/python39_compat.py

  Example-Test:
    runs-on: smallworld-arc
    needs: Lint
    steps:
      - uses: cachix/cachix-action@v17
        with:
          name: smallworld
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - uses: actions/checkout@v6
      - name: Run Example
        run: |
          cd examples
          sed -i 's/github:smallworld-re\/smallworld/../' nix-harness.py
          ./nix-harness.py 100
  
  Downstream-Flake:
    runs-on: smallworld-arc
    needs: Lint
    steps:
      - uses: cachix/cachix-action@v17
        with:
          name: smallworld
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - uses: actions/checkout@v6
      - name: Test Flake
        run: |
          cd tests/downstream_flake
          nix flake update
          nix run .

  Integration-Matrix:
    runs-on: ubuntu-latest
    needs: Lint
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        env:
          SHARD_COUNT: ${{ env.INTEGRATION_SHARD_COUNT }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          count = int(os.environ["SHARD_COUNT"])
          print(f"matrix={json.dumps({'shard': list(range(count))})}")
          PY
          
  Integration-Test:
    runs-on: smallworld-arc
    needs: [Lint, Integration-Matrix]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.Integration-Matrix.outputs.matrix) }}
    steps:
      - uses: cachix/cachix-action@v17
        with:
          name: smallworld
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - uses: actions/checkout@v6
      - name: Build Artifacts
        run: |
          nix build ./ci#tests
          tar -C tests -xvf result/test_binaries.tar
          nix build ./ci#rtos_demo
          cp result/zephyr.elf use_cases/rtos_demo/zephyr.elf
      - name: Run Integration Tests
        run: |
          cd tests
          nix develop .. -c python3 integration.py -v --shard-index ${{ matrix.shard }} --shard-count ${{ env.INTEGRATION_SHARD_COUNT }}
          
  Results:
    runs-on: smallworld-arc
    needs: [Lint, Unit-Test, Example-Test, Integration-Matrix, Integration-Test, Downstream-Flake, Python39]
    if: always()
    steps:
      - name: Formatter committed – new run will verify
        if: needs.Lint.outputs.changes_detected == 'true'
        run: exit 1

      - name: All tests OK
        if: needs.Lint.outputs.changes_detected != 'true' && !contains(needs.*.result, 'failure')
        run: exit 0

      - name: Tests Failed
        if: needs.Lint.outputs.changes_detected != 'true' && contains(needs.*.result, 'failure')
        run: exit 1
      
