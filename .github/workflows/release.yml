name: Release

on:
  release: 
    types: [released]


jobs:
  Deploy:
    runs-on: ubuntu-latest
    env:
      TZ: UTC
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[development] -c constraints.txt
      - name: Build
        env:
          PIP_CONSTRAINT: constraints.txt
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Deploy
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

  Docs:
    runs-on: smallworld-arc    
    steps:          
      - name: Checkout
        uses: actions/checkout@v3
        env:
          bot_token: ${{ secrets.BOT_TOKEN }}
        if: ${{ env.bot_token != '' }}
        with:
          token: ${{ secrets.BOT_TOKEN }}
      - name: Build devshell
        run: |
          nix -L develop -c true
      - name: Build Test Artifacts
        run: |
          nix build .#tests
          tar -C tests -xvf result/test_binaries.tar
          nix build .#rtos_demo
          cp result/zephyr.elf use_cases/rtos_demo/zephyr.elf
      - name: Build docs
        run: |
          nix develop -c sphinx-build -W -b html docs build/documentation
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: build/documentation
          # destination_dir: main
          exclude_assets: .gitignore

