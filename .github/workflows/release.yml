name: Release

on:
  release: 
    types: [released]


jobs:
  Deploy:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    env:
      TZ: UTC
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Build
        run: uv build
      - name: Publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
  Docs:
    runs-on: smallworld-arc    
    steps:          
      - name: Checkout
        uses: actions/checkout@v3
        env:
          bot_token: ${{ secrets.BOT_TOKEN }}
        if: ${{ env.bot_token != '' }}
        with:
          token: ${{ secrets.BOT_TOKEN }}
      - name: Build devshell
        run: |
          nix -L develop -c true
      - name: Build Test Artifacts
        run: |
          nix build .#tests
          tar -C tests -xvf result/test_binaries.tar
          rm -rf result
          nix build .#rtos_demo
          cp result/zephyr.elf use_cases/rtos_demo/zephyr.elf
      - name: Build docs
        run: |
          nix develop -c sphinx-build -W -b html docs build/documentation
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: build/documentation
          # destination_dir: main
          exclude_assets: .gitignore

